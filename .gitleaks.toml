title = "SovereignClaw secret-scan rules"

# Custom detection: catch ORACLE_PRIVATE_KEY assignments in any file. The
# dev-oracle key is the highest-impact secret in this repo (anyone holding it
# can sign valid transfer/revoke proofs), so we want gitleaks to shout about
# any literal private key placed alongside it.
[[rules]]
id = "sovereignclaw-oracle-private-key"
description = "ORACLE_PRIVATE_KEY assignment with a real-looking 0x-hex value"
regex = '''(?i)ORACLE_PRIVATE_KEY[^=\n]*=\s*['"\s]*0x[0-9a-fA-F]{64}\b'''
tags = ["secret", "oracle", "sovereignclaw"]

# Same for the developer wallet PRIVATE_KEY.
[[rules]]
id = "sovereignclaw-private-key"
description = "PRIVATE_KEY assignment with a real-looking 0x-hex value"
regex = '''(?i)\bPRIVATE_KEY[^=\n]*=\s*['"\s]*0x[0-9a-fA-F]{64}\b'''
tags = ["secret", "wallet", "sovereignclaw"]

[allowlist]
description = "Files allowed to contain key-like strings"
paths = [
  '''(.*?)\.example$''',
  '''(.*?)README\.md$''',
  '''docs/''',
  '''\.gitleaks\.toml$''',
  '''contracts/test/.*\.t\.sol$''',
  '''packages/.*/test/.*''',
  '''apps/.*/test/.*''',
]
regexes = [
  '''0x_replace_with_[0-9a-z_]+''',
  '''0x0+''',
]
