name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node:
    name: Node - lint, typecheck, test, build, LoC gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # @sovereignclaw/inft imports Foundry JSON from contracts/out/*. A
      # clean checkout has no out/ — typecheck and tsup both need the ABIs.
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable
      - name: Build Solidity (forge out/ for inft ABIs)
        working-directory: contracts
        run: |
          forge install foundry-rs/forge-std --no-git
          forge install OpenZeppelin/openzeppelin-contracts@v5.1.0 --no-git
          forge build --sizes
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      # Phase 9: CI gate on the LoC benchmark. Fails the job if any
      # §16 target is exceeded. Cheap, deterministic, no network.
      - name: LoC benchmark gate (§16 regression guard)
        run: pnpm benchmark:loc --check

  contracts:
    name: Foundry - build + test + snapshot
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable
      - name: Install forge-std
        working-directory: contracts
        run: forge install foundry-rs/forge-std --no-git
      - name: Install OpenZeppelin contracts
        working-directory: contracts
        run: forge install OpenZeppelin/openzeppelin-contracts@v5.1.0 --no-git
      - working-directory: contracts
        run: forge build --sizes
      - name: Run unit + fuzz suites (skip slow invariants)
        working-directory: contracts
        run: forge test --no-match-contract AgentNFTInvariantTest -vvv
      - name: Run invariant suite
        working-directory: contracts
        run: forge test --match-contract AgentNFTInvariantTest -vvv
      - name: Gas snapshot regression gate
        working-directory: contracts
        # Fuzz tests report (runs, μ, ~) that drifts across foundry
        # versions and platforms; we only gate deterministic unit tests.
        run: forge snapshot --no-match-test "testFuzz" --no-match-contract AgentNFTInvariantTest --check .gas-snapshot

  gitleaks:
    name: Secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
